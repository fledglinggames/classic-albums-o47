<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- White canvas (1000x1000), with the 750x750 design centered via translate(125,125) -->
  <rect width="1000" height="1000" fill="white"/>
  
  <g transform="translate(20, -10)">
    <!-- Cursive loopy "title" squiggle at top — ~60% coil variation, shifted +12,+12 -->
    <g transform="translate(12, 12)">
      <path d="M 105 95
               C 162 95, 147 56, 129 59
               C 113 62, 125 95, 149 92
               C 195 92, 180 56, 162 59
               C 146 62, 158 95, 182 92
               C 228 92, 213 56, 195 59
               C 179 62, 191 95, 215 92
               C 261 92, 246 56, 228 59
               C 212 62, 224 95, 248 92
               L 269 96"
            stroke="#336d9a" stroke-width="7" fill="none" 
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Top-left square: orange (upper-right triangle) + red (lower-left triangle) -->
    <polygon points="120,130 370,130 370,380" fill="#d11d0f"/>
    <polygon points="120,130 120,380 370,380" fill="#d583a7"/>
    
    <!-- Top-right square MIRRORED: light orange (upper-left) + yellow (lower-right) -->
    <polygon points="395,130 645,130 395,380" fill="#fca731"/>
    <polygon points="645,130 645,380 395,380" fill="#f2e12a"/>
    
    <!-- Bottom-left square: fuchsia (upper-left) + purple (lower-right) -->
    <polygon points="120,460 370,460 120,710" fill="#59539b"/>
    <polygon points="370,460 370,710 120,710" fill="#67a8dc"/>
    
    <!-- Bottom-right square: green (upper-right) + blue (lower-left) -->
    <polygon points="395,460 645,460 645,710" fill="#b4d655"/>
    <polygon points="395,460 395,710 645,710" fill="#409752"/>
    
    <!-- Blue "label" lines below each square -->
    <line x1="125" y1="400" x2="235" y2="400" stroke="#336d9a" stroke-width="7" stroke-linecap="round"/>
    <line x1="400" y1="400" x2="465" y2="400" stroke="#336d9a" stroke-width="7" stroke-linecap="round"/>
    <line x1="125" y1="730" x2="210" y2="730" stroke="#336d9a" stroke-width="7" stroke-linecap="round"/>
    <line x1="400" y1="730" x2="530" y2="730" stroke="#336d9a" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
