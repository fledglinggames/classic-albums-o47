name: ClassicAlbums
options:
  bundleIdPrefix: com.classicalbums
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: "45SN2LA53J"
    CODE_SIGN_STYLE: Automatic

targets:
  ClassicAlbums:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ClassicAlbums
    resources:
      - path: ClassicAlbums/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fledglinggames.classicphotos
        PRODUCT_NAME: ClassicAlbums
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.photography"
        INFOPLIST_KEY_CFBundleDisplayName: "Classic Albums"
        INFOPLIST_KEY_UILaunchStoryboardName: "LaunchScreen"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Classic Albums needs access to display and organize your photos and albums."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Classic Albums needs permission to save photos to your library."
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
